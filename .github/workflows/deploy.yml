name: Deploy Backend

on:
  push:
    branches:
      - develop   # → staging
      - main      # → production
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # STAGING  (develop branch)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies & build (CI check)
        run: |
          cd backend
          npm ci
          npm run build

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 60m
          script: |
            set -e

            # ── Ensure swap exists (one-time setup; persists across reboots) ──
            if ! swapon --show | grep -q /swapfile; then
              echo "→ Creating 2 GB swap file (first-time setup)…"
              sudo dd if=/dev/zero of=/swapfile bs=128M count=16 status=none
              sudo chmod 600 /swapfile
              sudo mkswap -q /swapfile
              sudo swapon /swapfile
              grep -q /swapfile /etc/fstab || echo '/swapfile swap swap defaults 0 0' | sudo tee -a /etc/fstab > /dev/null
              echo "   Swap ready: $(free -h | awk '/Swap/{print $2}')"
            fi

            cd ~/ceren-backend

            echo "→ Pulling latest develop…"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/WebStride/CerenMobile.git"
            git fetch origin
            git clean -fd
            git checkout develop 2>/dev/null || git checkout -b develop --track origin/develop
            git reset --hard origin/develop
            git remote set-url origin "https://github.com/WebStride/CerenMobile.git"

            cd backend

            # ── Only reinstall when package-lock.json changes ──────────────
            LOCK_HASH=$(md5sum package-lock.json | awk '{print $1}')
            LAST_HASH_FILE=".last-deploy-lock-hash"
            LAST_HASH=""
            [ -f "$LAST_HASH_FILE" ] && LAST_HASH=$(cat "$LAST_HASH_FILE")

            if [ "$LOCK_HASH" != "$LAST_HASH" ] || [ ! -d node_modules ]; then
              echo "→ package-lock.json changed – running npm ci…"
              npm ci --omit=dev
              echo "$LOCK_HASH" > "$LAST_HASH_FILE"
            else
              echo "→ package-lock.json unchanged – skipping npm ci"
            fi

            echo "→ Generating Prisma client…"
            npx prisma generate

            echo "→ Building TypeScript…"
            npm run build

            echo "→ Running pending DB migrations…"
            npx prisma migrate deploy

            echo "→ Creating logs directory…"
            mkdir -p logs

            echo "→ Reloading PM2 (zero-downtime)…"
            pm2 reload ecosystem.config.js --env staging --update-env || \
              pm2 start ecosystem.config.js --env staging

            pm2 save
            echo "✅ Staging deployment complete"

  # ─────────────────────────────────────────────────────────────────────────
  # PRODUCTION  (main branch)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies & build (CI check)
        run: |
          cd backend
          npm ci
          npm run build

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 60m
          script: |
            set -e

            # ── Ensure swap exists (one-time setup; persists across reboots) ──
            if ! swapon --show | grep -q /swapfile; then
              echo "→ Creating 2 GB swap file (first-time setup)…"
              sudo dd if=/dev/zero of=/swapfile bs=128M count=16 status=none
              sudo chmod 600 /swapfile
              sudo mkswap -q /swapfile
              sudo swapon /swapfile
              grep -q /swapfile /etc/fstab || echo '/swapfile swap swap defaults 0 0' | sudo tee -a /etc/fstab > /dev/null
              echo "   Swap ready: $(free -h | awk '/Swap/{print $2}')"
            fi

            cd ~/ceren-backend

            echo "→ Pulling latest main…"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/WebStride/CerenMobile.git"
            git fetch origin
            git clean -fd
            git checkout main 2>/dev/null || git checkout -b main --track origin/main
            git reset --hard origin/main
            git remote set-url origin "https://github.com/WebStride/CerenMobile.git"

            cd backend

            # ── Only reinstall when package-lock.json changes ──────────────
            LOCK_HASH=$(md5sum package-lock.json | awk '{print $1}')
            LAST_HASH_FILE=".last-deploy-lock-hash"
            LAST_HASH=""
            [ -f "$LAST_HASH_FILE" ] && LAST_HASH=$(cat "$LAST_HASH_FILE")

            if [ "$LOCK_HASH" != "$LAST_HASH" ] || [ ! -d node_modules ]; then
              echo "→ package-lock.json changed – running npm ci…"
              npm ci --omit=dev
              echo "$LOCK_HASH" > "$LAST_HASH_FILE"
            else
              echo "→ package-lock.json unchanged – skipping npm ci"
            fi

            echo "→ Generating Prisma client…"
            npx prisma generate

            echo "→ Building TypeScript…"
            npm run build

            echo "→ Running pending DB migrations…"
            npx prisma migrate deploy

            echo "→ Creating logs directory…"
            mkdir -p logs

            echo "→ Reloading PM2 (zero-downtime)…"
            pm2 reload ecosystem.config.js --env production --update-env || \
              pm2 start ecosystem.config.js --env production

            pm2 save
            echo "✅ Production deployment complete"
