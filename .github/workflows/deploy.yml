name: Deploy Backend

on:
  push:
    branches:
      - develop   # → staging
      - main      # → production
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # STAGING  (develop branch)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies & build (CI check)
        run: |
          cd backend
          npm ci
          npm run build

      - name: Deploy to Staging via SSH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_ACCESS_TOKEN_SECRET: ${{ secrets.STAGING_ACCESS_TOKEN_SECRET }}
          STAGING_REFRESH_TOKEN_SECRET: ${{ secrets.STAGING_REFRESH_TOKEN_SECRET }}
          STAGING_MSG91_AUTH_KEY: ${{ secrets.STAGING_MSG91_AUTH_KEY }}
          STAGING_MSG91_TEMPLATE_ID: ${{ secrets.STAGING_MSG91_TEMPLATE_ID }}
          STAGING_MSG91_OTP_LENGTH: ${{ secrets.STAGING_MSG91_OTP_LENGTH }}
          STAGING_MSG91_OTP_EXPIRY: ${{ secrets.STAGING_MSG91_OTP_EXPIRY }}
          STAGING_IMAGE_BASE_URL: ${{ secrets.STAGING_IMAGE_BASE_URL }}
          STAGING_TEST_PHONE_NUMBERS: ${{ secrets.STAGING_TEST_PHONE_NUMBERS }}
          STAGING_NOTIFY_ADMIN_ON_NEW_USER: ${{ secrets.STAGING_NOTIFY_ADMIN_ON_NEW_USER }}
          STAGING_ADMIN_WHATSAPP_NUMBER: ${{ secrets.STAGING_ADMIN_WHATSAPP_NUMBER }}
        timeout-minutes: 60
        run: |
          printf '%s' "$STAGING_SSH_KEY" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem
          mkdir -p ~/.ssh
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # ── Validate required secrets ────────────────────────────────────────
          for var in STAGING_DATABASE_URL STAGING_ACCESS_TOKEN_SECRET STAGING_REFRESH_TOKEN_SECRET; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Required GitHub secret $var is not set in the staging environment"
              exit 1
            fi
          done
          # ── Write backend .env to staging server ──────────────────────────────
          printf '%s\n' \
            "NODE_ENV=staging" \
            "DATABASE_URL=${STAGING_DATABASE_URL}" \
            "ACCESS_TOKEN_SECRET=${STAGING_ACCESS_TOKEN_SECRET}" \
            "REFRESH_TOKEN_SECRET=${STAGING_REFRESH_TOKEN_SECRET}" \
            "MSG91_AUTH_KEY=${STAGING_MSG91_AUTH_KEY}" \
            "MSG91_TEMPLATE_ID=${STAGING_MSG91_TEMPLATE_ID}" \
            "MSG91_OTP_LENGTH=${STAGING_MSG91_OTP_LENGTH}" \
            "MSG91_OTP_EXPIRY=${STAGING_MSG91_OTP_EXPIRY}" \
            "IMAGE_BASE_URL=${STAGING_IMAGE_BASE_URL}" \
            "TEST_PHONE_NUMBERS=${STAGING_TEST_PHONE_NUMBERS}" \
            "NOTIFY_ADMIN_ON_NEW_USER=${STAGING_NOTIFY_ADMIN_ON_NEW_USER}" \
            "ADMIN_WHATSAPP_NUMBER=${STAGING_ADMIN_WHATSAPP_NUMBER}" \
            | base64 -w 0 \
            | ssh -i /tmp/deploy_key.pem \
                -o ConnectTimeout=30 -o BatchMode=yes \
                "$STAGING_SSH_USER@$STAGING_HOST" \
                "base64 -d > ~/ceren-backend/backend/.env"
          echo "✓ .env written to staging server"
          cat << DEPLOY_SCRIPT | ssh -i /tmp/deploy_key.pem \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=30 \
            -o BatchMode=yes \
            "$STAGING_SSH_USER@$STAGING_HOST" bash
          set -e
          GH_TOKEN="${GH_TOKEN}"
          if ! swapon --show | grep -q /swapfile; then
            echo "→ Creating 2 GB swap file…"
            sudo fallocate -l 2G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=128M count=16 status=none
            sudo chmod 600 /swapfile && sudo mkswap -q /swapfile && sudo swapon /swapfile
            grep -q /swapfile /etc/fstab || echo '/swapfile swap swap defaults 0 0' | sudo tee -a /etc/fstab > /dev/null
          fi
          cd ~/ceren-backend
          echo "→ Pulling latest develop…"
          git remote set-url origin "https://x-access-token:\${GH_TOKEN}@github.com/WebStride/CerenMobile.git"
          git fetch origin
          git clean -fd
          git checkout develop 2>/dev/null || git checkout -b develop --track origin/develop
          git reset --hard origin/develop
          git remote set-url origin "https://github.com/WebStride/CerenMobile.git"
          cd backend
          LOCK_HASH=\$(md5sum package-lock.json | awk '{print \$1}')
          LAST_HASH_FILE="\$HOME/.ceren-staging-npm-hash"
          LAST_HASH=""; [ -f "\$LAST_HASH_FILE" ] && LAST_HASH=\$(cat "\$LAST_HASH_FILE")
          if [ "\$LOCK_HASH" != "\$LAST_HASH" ] || [ ! -d node_modules ]; then
            echo "→ package-lock.json changed – running npm ci…"
            npm ci
            echo "\$LOCK_HASH" > "\$LAST_HASH_FILE"
          else
            echo "→ package-lock.json unchanged – skipping npm ci"
          fi
          echo "→ Generating Prisma client…" && npx prisma generate
          echo "→ Building TypeScript…" && npm run build
          echo "→ Running migrations…"
          MIGRATE_OUT=\$(npx prisma migrate deploy 2>&1); MIGRATE_EXIT=\$?
          echo "\$MIGRATE_OUT"
          if [ \$MIGRATE_EXIT -ne 0 ]; then
            if echo "\$MIGRATE_OUT" | grep -q 'P3005'; then
              echo "→ DB schema exists without migration history – baselining all migrations…"
              for m in \$(ls prisma/migrations/ | grep -v migration_lock); do
                npx prisma migrate resolve --applied "\$m" 2>&1 || true
              done
              npx prisma migrate deploy
            else
              exit \$MIGRATE_EXIT
            fi
          fi
          mkdir -p logs
          pm2 reload ecosystem.config.js --env staging --update-env || pm2 start ecosystem.config.js --env staging
          pm2 save
          echo "✅ Staging deployment complete"
          DEPLOY_SCRIPT
          rm -f /tmp/deploy_key.pem

  # ─────────────────────────────────────────────────────────────────────────
  # PRODUCTION  (main branch)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies & build (CI check)
        run: |
          cd backend
          npm ci
          npm run build

      - name: Deploy to Production via SSH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PRODUCTION_ACCESS_TOKEN_SECRET: ${{ secrets.PRODUCTION_ACCESS_TOKEN_SECRET }}
          PRODUCTION_REFRESH_TOKEN_SECRET: ${{ secrets.PRODUCTION_REFRESH_TOKEN_SECRET }}
          PRODUCTION_MSG91_AUTH_KEY: ${{ secrets.PRODUCTION_MSG91_AUTH_KEY }}
          PRODUCTION_MSG91_TEMPLATE_ID: ${{ secrets.PRODUCTION_MSG91_TEMPLATE_ID }}
          PRODUCTION_MSG91_OTP_LENGTH: ${{ secrets.PRODUCTION_MSG91_OTP_LENGTH }}
          PRODUCTION_MSG91_OTP_EXPIRY: ${{ secrets.PRODUCTION_MSG91_OTP_EXPIRY }}
          PRODUCTION_IMAGE_BASE_URL: ${{ secrets.PRODUCTION_IMAGE_BASE_URL }}
          PRODUCTION_TEST_PHONE_NUMBERS: ${{ secrets.PRODUCTION_TEST_PHONE_NUMBERS }}
          PRODUCTION_NOTIFY_ADMIN_ON_NEW_USER: ${{ secrets.PRODUCTION_NOTIFY_ADMIN_ON_NEW_USER }}
          PRODUCTION_ADMIN_WHATSAPP_NUMBER: ${{ secrets.PRODUCTION_ADMIN_WHATSAPP_NUMBER }}
        timeout-minutes: 60
        run: |
          printf '%s' "$PRODUCTION_SSH_KEY" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem
          mkdir -p ~/.ssh
          ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # ── Validate required secrets ────────────────────────────────────────
          for var in PRODUCTION_DATABASE_URL PRODUCTION_ACCESS_TOKEN_SECRET PRODUCTION_REFRESH_TOKEN_SECRET; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Required GitHub secret $var is not set in the production environment"
              exit 1
            fi
          done
          # ── Write backend .env to production server ───────────────────────────
          printf '%s\n' \
            "NODE_ENV=production" \
            "DATABASE_URL=${PRODUCTION_DATABASE_URL}" \
            "ACCESS_TOKEN_SECRET=${PRODUCTION_ACCESS_TOKEN_SECRET}" \
            "REFRESH_TOKEN_SECRET=${PRODUCTION_REFRESH_TOKEN_SECRET}" \
            "MSG91_AUTH_KEY=${PRODUCTION_MSG91_AUTH_KEY}" \
            "MSG91_TEMPLATE_ID=${PRODUCTION_MSG91_TEMPLATE_ID}" \
            "MSG91_OTP_LENGTH=${PRODUCTION_MSG91_OTP_LENGTH}" \
            "MSG91_OTP_EXPIRY=${PRODUCTION_MSG91_OTP_EXPIRY}" \
            "IMAGE_BASE_URL=${PRODUCTION_IMAGE_BASE_URL}" \
            "TEST_PHONE_NUMBERS=${PRODUCTION_TEST_PHONE_NUMBERS}" \
            "NOTIFY_ADMIN_ON_NEW_USER=${PRODUCTION_NOTIFY_ADMIN_ON_NEW_USER}" \
            "ADMIN_WHATSAPP_NUMBER=${PRODUCTION_ADMIN_WHATSAPP_NUMBER}" \
            | base64 -w 0 \
            | ssh -i /tmp/deploy_key.pem \
                -o ConnectTimeout=30 -o BatchMode=yes \
                "$PRODUCTION_SSH_USER@$PRODUCTION_HOST" \
                "base64 -d > ~/ceren-backend/backend/.env"
          echo "✓ .env written to production server"
          cat << DEPLOY_SCRIPT | ssh -i /tmp/deploy_key.pem \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=30 \
            -o BatchMode=yes \
            "$PRODUCTION_SSH_USER@$PRODUCTION_HOST" bash
          set -e
          GH_TOKEN="${GH_TOKEN}"
          if ! swapon --show | grep -q /swapfile; then
            echo "→ Creating 2 GB swap file…"
            sudo fallocate -l 2G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=128M count=16 status=none
            sudo chmod 600 /swapfile && sudo mkswap -q /swapfile && sudo swapon /swapfile
            grep -q /swapfile /etc/fstab || echo '/swapfile swap swap defaults 0 0' | sudo tee -a /etc/fstab > /dev/null
          fi
          cd ~/ceren-backend
          echo "→ Pulling latest main…"
          git remote set-url origin "https://x-access-token:\${GH_TOKEN}@github.com/WebStride/CerenMobile.git"
          git fetch origin
          git clean -fd
          git checkout main 2>/dev/null || git checkout -b main --track origin/main
          git reset --hard origin/main
          git remote set-url origin "https://github.com/WebStride/CerenMobile.git"
          cd backend
          LOCK_HASH=\$(md5sum package-lock.json | awk '{print \$1}')
          LAST_HASH_FILE="\$HOME/.ceren-production-npm-hash"
          LAST_HASH=""; [ -f "\$LAST_HASH_FILE" ] && LAST_HASH=\$(cat "\$LAST_HASH_FILE")
          if [ "\$LOCK_HASH" != "\$LAST_HASH" ] || [ ! -d node_modules ]; then
            echo "→ package-lock.json changed – running npm ci…"
            npm ci
            echo "\$LOCK_HASH" > "\$LAST_HASH_FILE"
          else
            echo "→ package-lock.json unchanged – skipping npm ci"
          fi
          echo "→ Generating Prisma client…" && npx prisma generate
          echo "→ Building TypeScript…" && npm run build
          echo "→ Running migrations…"
          MIGRATE_OUT=\$(npx prisma migrate deploy 2>&1); MIGRATE_EXIT=\$?
          echo "\$MIGRATE_OUT"
          if [ \$MIGRATE_EXIT -ne 0 ]; then
            if echo "\$MIGRATE_OUT" | grep -q 'P3005'; then
              echo "→ DB schema exists without migration history – baselining all migrations…"
              for m in \$(ls prisma/migrations/ | grep -v migration_lock); do
                npx prisma migrate resolve --applied "\$m" 2>&1 || true
              done
              npx prisma migrate deploy
            else
              exit \$MIGRATE_EXIT
            fi
          fi
          mkdir -p logs
          pm2 reload ecosystem.config.js --env production --update-env || pm2 start ecosystem.config.js --env production
          pm2 save
          echo "✅ Production deployment complete"
          DEPLOY_SCRIPT
          rm -f /tmp/deploy_key.pem
